<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('chat.png');
            background-size: cover;
        }

        .box {
            background: rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background:#4e1f02;
            color: white;
            border: none;
        }

        .msg {
            font-size: 14px;
        }

        .strength {
            font-size: 13px;
            text-align: left;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Reset Password</h2>

    <!-- New Password -->
    <div class="password-box">
        <input type="password" id="newPass" placeholder="New Password" onkeyup="checkStrength()">
        <span onclick="togglePassword('newPass', this)">👁️</span>
    </div>

    <div id="strengthText" class="strength"></div>

    <!-- Confirm Password -->
    <div class="password-box">
        <input type="password" id="confirmPass" placeholder="Confirm Password">
        <span onclick="togglePassword('confirmPass', this)">👁️</span>
    </div>

    <button onclick="resetPassword()">Update Password</button>

    <p id="msg" class="msg"></p>
    
</div>

<script>
// 👁️ Show/Hide
function togglePassword(id, icon) {
    var input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
    } else {
        input.type = "password";
        icon.textContent = "👁️";
    }
}

// 🔥 Strength Check
function checkStrength() {
    var pass = document.getElementById("newPass").value;
    var strength = document.getElementById("strengthText");

    var strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (pass.length === 0) {
        strength.textContent = "";
    } else if (strong.test(pass)) {
        strength.textContent = "Strong Password 💪";
        strength.style.color = "lightgreen";
    } else {
        strength.textContent = "Weak Password ❌";
        strength.style.color = "red";
    }
}

// ✅ Reset Password
function resetPassword() {
    var pass = document.getElementById("newPass").value;
    var confirm = document.getElementById("confirmPass").value;
    var msg = document.getElementById("msg");

    var strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!pass || !confirm) {
        msg.textContent = "Fill all fields!";
        msg.style.color = "red";
        return;
    }

    if (!strong.test(pass)) {
        msg.textContent = "Password not strong enough!";
        msg.style.color = "red";
        return;
    }

    if (pass !== confirm) {
        msg.textContent = "Passwords do not match!";
        msg.style.color = "red";
        return;
    }

    // ✅ update password
    localStorage.setItem("password", pass);

    msg.textContent = "Password updated successfully!";
    msg.style.color = "lightgreen";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1500);
}
</script>

</body>
</html>
