<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            background: url('chat.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 0 15px rgb(100, 46, 1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 10px;
            background: rgb(100, 46, 1);
            color: white;
            border: none;
        }

        button:hover {
            background: rgb(43, 8, 1);
        }

        .error {
            color: red;
            text-align: center;
            font-size: 13px;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <!-- ✅ SINGLE FORM -->
    <form onsubmit="return validateLogin()">

        <input type="text" id="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" id="password" placeholder="Password" required>
            <span onclick="togglePassword()" id="eye">👁️</span>
        </div>

        <!-- ✅ ERROR MESSAGE -->
        <p id="errorMsg" class="error"></p>

        <button type="submit">Login</button>

        <p style="text-align:center;">
            <a href="forgot.html" style="color:#4e1f02; text-decoration:underline;">
                Forgot Password?
            </a>
        </p>
        <p style="text-align:center;">
            Don't have an account?
            <a href="signup.html" style="color:#4e1f02; text-decoration:underline;">
                Sign Up
            </a>
        </p>

    </form>
</div>

<script>
function togglePassword() {
    var pass = document.getElementById("password");
    var eye = document.getElementById("eye");

    if (pass.type === "password") {
        pass.type = "text";
        eye.textContent = "🙈";
    } else {
        pass.type = "password";
        eye.textContent = "👁️";
    }
}


function validateLogin() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;
    var error = document.getElementById("errorMsg");

    var correctUser = localStorage.getItem("username");
    var correctPass = localStorage.getItem("password");

    if (!correctUser || !correctPass) {
        error.textContent = "Please sign up first!";
        return false;
    }

    if (user === correctUser && pass === correctPass) {
        alert("Login successful!");
        return true;
    } else {
        error.textContent = "Invalid username or password!";
        return false;
    }
}
</script>
</body>
</html>
